name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: powershell
        working-directory: desktop_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[build]"

      - name: Build executable
        run: |
          python -m PyInstaller --noconfirm --clean packaging/pyinstaller.spec

      - name: Install Inno Setup
        run: |
          choco install innosetup --no-progress -y

      - name: Build installer
        run: |
          ISCC packaging/installer.iss

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LakeLotManager-windows
          path: |
            desktop_app/dist/LakeLotManager/**
            desktop_app/dist/installer/LakeLotManagerSetup.exe

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop_app/dist/installer/LakeLotManagerSetup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
